<form [formGroup]="form" (ngSubmit)="onSubmit()" class="task-form">
  <div>
    <label for="title">Title</label>
    <input
      id="title"
      type="text"
      formControlName="title"
      placeholder="Enter task title"
    />
    <div *ngIf="hasTitleError" class="error">Title is required</div>
  </div>

  <div>
    <label for="description">Description</label>
    <textarea id="description" formControlName="description"></textarea>
  </div>

  <div>
    <label for="status">Status</label>
    <select id="status" formControlName="status">
      <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
    </select>
  </div>

  <div>
    <label for="dueDate">Due date &amp; time</label>
    <input id="dueDate" type="datetime-local" formControlName="dueDate" />
    <div *ngIf="hasPastDueDateError" class="error">
      Past due date/time is only allowed for completed tasks.
    </div>
  </div>

  <div class="buttons">
    <button type="submit" [disabled]="hasTitleError || hasPastDueDateError">Save</button>
    <button type="button" (click)="onCancel()">Cancel</button>
  </div>
</form>
